name: Build XR1710G Firmware

on:
  push:
    paths:
      - '.github/workflows/fastbuild.yaml'
  workflow_dispatch:

env:
  # 此处根据 XR1710G 的硬件平台，建议使用支持 Airoha AN7581 芯片组的源码库
  # 如果你的源码有特定分支（例如 openwrt-24.10 或 immortalwrt-23.05），请在此处修改 REPO_BRANCH
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master 
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialize Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone OpenWrt Source
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Fetch XR1710G Base Configs & Patches
      run: |
        # 克隆包含你基础设置和补丁的仓库
        git clone https://github.com/luoyizhi1987/xr1710g-builds.git /tmp/xr1710g-builds
        
        cd openwrt
        # 1. 智能解析并应用补丁 (修复 001-004 号补丁目录层级报错)
        if [ -d "/tmp/xr1710g-builds/user/xr1710g-oc/patches" ]; then
          for p in /tmp/xr1710g-builds/user/xr1710g-oc/patches/*.patch; do
            if [ -f "$p" ]; then
              echo "----------------------------------------"
              echo "📦 正在应用补丁: $(basename "$p")"
              
              # 智能判断：如果补丁文件内容以 "--- a/" 开头，说明是标准 git 补丁，用 -p1；否则用 -p0
              if grep -q "^--- a/" "$p"; then
                echo "🔍 检测到标准前缀，使用 -p1 模式"
                patch -f -p1 < "$p" || echo "❌ 补丁应用失败！请检查冲突。"
              else
                echo "🔍 未检测到前缀，使用 -p0 模式"
                patch -f -p0 < "$p" || echo "❌ 补丁应用失败！请检查冲突。"
              fi
            fi
          done
          echo "----------------------------------------"
        fi
        
        # 2. 复制基础 config 
        if [ -f "/tmp/xr1710g-builds/user/xr1710g-oc/.config" ]; then
          cp /tmp/xr1710g-builds/user/xr1710g-oc/.config .config
        fi

    - name: Update & Install Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Custom Settings (IP, Nikki, Wifi7 Manager)
      run: |
        cd openwrt
        
        # 1. 设置默认 IP 为 192.168.10.1
        sed -i 's/192.168.1.1/192.168.10.1/g' package/base-files/files/bin/config_generate
        
        # 2. 加入 mt7996-wifi7-manager 源码
        git clone https://github.com/woziwrt/mt7996-wifi7-manager.git package/mt7996-wifi7-manager
        
        # 3. 添加 Nikki (使用官方维护的最新开源地址)
        git clone https://github.com/nikkinikki-org/OpenWrt-nikki.git package/nikki

        # 🔧 核心修复：消除 Nikki 依赖中 mihomo-meta 与 mihomo-alpha 的循环引用报错
        find package/nikki -name "Makefile" -exec sed -i 's/DEPENDS:=+mihomo-meta//g' {} +
        find package/nikki -name "Makefile" -exec sed -i 's/DEPENDS:=+mihomo-alpha//g' {} +

        # 4. 追加编译模块与依赖 (Nikki透明代理所需的核心内核依赖)
        cat >> .config <<EOF
        
        # 启用 Wifi7 Manager
        CONFIG_PACKAGE_mt7996-wifi7-manager=y
        CONFIG_PACKAGE_luci-app-mt7996-wifi7-manager=y
        
        # 启用 Nikki 及其关联的 kmod 组件
        CONFIG_PACKAGE_luci-app-nikki=y
        CONFIG_PACKAGE_nikki=y
        CONFIG_PACKAGE_mihomo=y
        CONFIG_PACKAGE_kmod-tun=y
        CONFIG_PACKAGE_kmod-inet-diag=y
        CONFIG_PACKAGE_kmod-nft-tproxy=y
        CONFIG_PACKAGE_iptables-mod-tproxy=y
        EOF
        
        # 生成最终编译配置
        make defconfig

    - name: Download Packages
      id: package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Organize Files
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload Firmware to Release
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success'
      with:
        name: XR1710G_Firmware
        path: ${{ env.FIRMWARE }}
