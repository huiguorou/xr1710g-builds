name: Build XR1710G Firmware

on:
  push:
    paths:
      - '.github/workflows/fastbuild.yaml'
  workflow_dispatch:

env:
  # 此处请根据XR1710G实际支持的源码库修改（例如 ImmortalWrt 23.05 或 OpenWrt master）
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master 
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialize Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone OpenWrt Source
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Fetch XR1710G Base Configs & Patches
      run: |
        # 克隆包含你基础设置和补丁的仓库
        git clone https://github.com/luoyizhi1987/xr1710g-builds.git /tmp/xr1710g-builds
        
        cd openwrt
        # 1. 复制并应用 patches (按照需求2)
        if [ -d "/tmp/xr1710g-builds/user/xr1710g-oc/patches" ]; then
          cp -r /tmp/xr1710g-builds/user/xr1710g-oc/patches/* ./ 
          for p in *.patch; do
            [ -f "$p" ] && patch -p1 < "$p"
          done
        fi
        
        # 2. 复制基础 config 等设置 (按照需求1)
        if [ -f "/tmp/xr1710g-builds/user/xr1710g-oc/.config" ]; then
          cp /tmp/xr1710g-builds/user/xr1710g-oc/.config .config
        fi

    - name: Update & Install Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Custom Settings (IP, Nikki, Wifi7 Manager)
      run: |
        cd openwrt
        
        # 1. 设置默认 IP 为 192.168.10.1 (按照需求3)
        sed -i 's/192.168.1.1/192.168.10.1/g' package/base-files/files/bin/config_generate
        
        # 2. 加入 mt7996-wifi7-manager 源码 (按照需求5)
        git clone https://github.com/woziwrt/mt7996-wifi7-manager.git package/mt7996-wifi7-manager
        
        # 3. 添加 Nikki (含预编译核心) 和 UI 插件
        git clone https://github.com/sirpdboy/luci-app-nikki.git package/luci-app-nikki

        # 4. 追加编译模块与依赖 (Nikki内核依赖和Wifi7管理) (按照需求4)
        cat >> .config <<EOF
        
        # 启用 Wifi7 Manager
        CONFIG_PACKAGE_mt7996-wifi7-manager=y
        CONFIG_PACKAGE_luci-app-mt7996-wifi7-manager=y
        
        # 启用 Nikki 及其关联的 kmod (TUN和透明代理必须组件)
        CONFIG_PACKAGE_luci-app-nikki=y
        CONFIG_PACKAGE_nikki=y
        CONFIG_PACKAGE_kmod-tun=y
        CONFIG_PACKAGE_kmod-inet-diag=y
        CONFIG_PACKAGE_kmod-nft-tproxy=y
        CONFIG_PACKAGE_iptables-mod-tproxy=y
        EOF
        
        # 生成最终编译配置
        make defconfig

    - name: Download Packages
      id: package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Organize Files
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload Firmware to Release
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success'
      with:
        name: XR1710G_Firmware
        path: ${{ env.FIRMWARE }}
